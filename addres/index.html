<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet QR Generator Crypto Address Book</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.1/dist/ethers.umd.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/@reown/appkit@latest/dist/index.css"/>

<style>

body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

.form-box{
    max-width:700px;
    margin:auto;
    background:#1e293b;
    padding:20px;
    border-radius:16px;
}

input,select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#0f172a;
    color:white;
}

button{
    border:none;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    color:white;
}

.generate{background:#2563eb;width:100%;}

.wallets{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    margin-top:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:16px;
}

.coin{font-size:20px;font-weight:bold;}

.address{
    background:#0f172a;
    padding:10px;
    border-radius:10px;
    word-break:break-all;
    margin:10px 0;
}

.qr{
    background:white;
    padding:10px;
    display:inline-block;
    border-radius:10px;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:10px;
    flex-wrap:wrap;
}

.copy{background:#2563eb;}
.download{background:#16a34a;}
.explorer{background:#f59e0b;text-decoration:none;padding:10px;border-radius:10px;color:white;}

.creator-box{
    margin-top:40px;
    background:#1e293b;
    padding:25px;
    border-radius:16px;
    text-align:center;
}

.send-btn{
    background:#22c55e;
    width:100%;
    margin-top:10px;
}

.status{
    margin-top:10px;
    font-size:14px;
    color:#cbd5e1;
}

</style>
</head>

<body>

<h1>📬 Wallet QR Generator</h1>

<div class="form-box">

<select id="coin">
<option>ETH</option>
<option>SOL</option>
<option>BTC</option>
<option>TRX</option>
<option>DOGE</option>
<option>LTC</option>
<option>XRP</option>
</select>

<input id="address" placeholder="Masukkan wallet address">

<button class="generate" onclick="generateWallet()">
⚡ Generate QR
</button>

</div>

<div class="wallets" id="wallets"></div>

wallets.forEach((wallet,index)=>{

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<div class="coin">${wallet.name}</div>

<div class="address">${wallet.address}</div>

<div class="qr" id="qr-${index}"></div>

<div class="buttons">

<button class="copy"
onclick="copyAddress('${wallet.address}')">
📋 Copy
</button>

<button class="download"
onclick="downloadQR(${index}, '${wallet.name}')">
⬇ Download QR
</button>

<a class="explorer"
href="${wallet.explorer}"
target="_blank">
🔎 Explorer
</a>

</div>
`;

container.appendChild(card);

new QRCode(document.getElementById(`qr-${index}`),{
text: wallet.address,
width:180,
height:180
});

});

function copyAddress(address){
navigator.clipboard.writeText(address);
alert("Address copied!");
}

function downloadQR(index,name){

const qrDiv =
document.querySelector(`#qr-${index} img`) ||
document.querySelector(`#qr-${index} canvas`);

let url;

if(qrDiv.tagName === "IMG"){
url = qrDiv.src;
}else{
url = qrDiv.toDataURL("image/png");
}

const a = document.createElement("a");

a.href = url;
a.download = name + "-QR.png";

a.click();

}

<!-- CREATOR -->
<div class="creator-box">

<h2>🚀 Support Creator</h2>

<appkit-button balance="show"></appkit-button>

<p>Send 0.09 ETH to creator</p>

<button class="send-btn" onclick="pay()">
💸 Send 0.09 ETH
</button>

<div class="status" id="status">Waiting...</div>

</div>

<script>

const explorers = {
ETH:"https://etherscan.io/address/",
SOL:"https://solscan.io/account/",
BTC:"https://www.blockchain.com/explorer/addresses/btc/",
TRX:"https://tronscan.org/#/address/",
DOGE:"https://dogechain.info/address/",
LTC:"https://blockchair.com/litecoin/address/",
XRP:"https://livenet.xrpl.org/accounts/"
};

let counter = 0;

function generateWallet(){

const coin = document.getElementById("coin").value;
const address = document.getElementById("address").value.trim();

if(!address){
alert("Isi address!");
return;
}

counter++;

const box = document.getElementById("wallets");

const card = document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="coin">${coin}</div>
<div class="address">${address}</div>

<div class="qr" id="qr-${counter}"></div>

<div class="buttons">
<button class="copy" onclick="copy('${address}')">Copy</button>
<a class="explorer" target="_blank" href="${explorers[coin]||''}${address}">Explorer</a>
<button class="download" onclick="download(${counter},'${coin}')">Download</button>
</div>
`;

box.prepend(card);

new QRCode(document.getElementById(`qr-${counter}`),{
text:address,
width:150,
height:150
});

document.getElementById("address").value="";
}

function copy(a){
navigator.clipboard.writeText(a);
alert("Copied");
}

function download(id,name){

const qr = document.querySelector(`#qr-${id} canvas`) ||
document.querySelector(`#qr-${id} img`);

const url = qr.toDataURL ? qr.toDataURL("image/png") : qr.src;

const a=document.createElement("a");
a.href=url;
a.download=name+"-qr.png";
a.click();
}

</script>

<script src="https://esm.sh/@reown/appkit@latest"></script>

<script type="module">

import { createAppKit } from "https://esm.sh/@reown/appkit";
import { EthersAdapter } from "https://esm.sh/@reown/appkit-adapter-ethers";
import { mainnet } from "https://esm.sh/@reown/appkit/networks";
import { BrowserProvider, parseEther } from "https://esm.sh/ethers";

const projectId = "5022875ce6ee68917f103ff9b1e3422d";

const modal = createAppKit({
adapters:[new EthersAdapter()],
networks:[mainnet],
projectId,
metadata:{
name:"Wallet QR",
description:"Donation App",
url:window.location.origin
}
});

let provider;

modal.subscribeProviders(state=>{
provider = state?.eip155;
});

window.pay = async function(){

const status = document.getElementById("status");

try{

if(!provider){
status.innerText="Connect wallet dulu";
modal.open();
return;
}

const ethersProvider = new BrowserProvider(provider);
const signer = await ethersProvider.getSigner();

const tx = await signer.sendTransaction({
to:"0x32ed98666663Fc8Dc7264BaF3fC1a3Ac4BFAE24B",
value:parseEther("0.09")
});

status.innerText="TX Sent: "+tx.hash;

}catch(e){

status.innerText="Failed";

}

}

</script>
