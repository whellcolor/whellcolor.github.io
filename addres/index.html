<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Wallet Address Book</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.desc{
    text-align:center;
    color:#94a3b8;
    margin-bottom:30px;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    border-radius:16px;
    padding:20px;
    box-shadow:0 0 10px rgba(0,0,0,.3);
}

.coin{
    font-size:22px;
    font-weight:bold;
    margin-bottom:10px;
}

.address{
    background:#0f172a;
    padding:12px;
    border-radius:10px;
    word-break:break-all;
    margin-bottom:15px;
    font-size:14px;
}

.qr{
    background:white;
    padding:10px;
    border-radius:12px;
    display:inline-block;
    margin-bottom:15px;
}

.buttons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    color:white;
}

.copy{
    background:#2563eb;
}

.download{
    background:#16a34a;
}

button:hover{
    opacity:.9;
}
</style>
</head>
<body>

<h1>📬 Crypto Wallet Address Book</h1>
<p class="desc">
Generate QR, copy address, dan download QR wallet crypto.
</p>

<div class="container" id="walletContainer"></div>

<script>

const wallets = [
{
name:"Ethereum (ETH)",
address:"0x5e8bade6e0bce65807db6327cb1d9eeb7c6a6a5b"
},
{
name:"Solana (SOL)",
address:"CB4xnv7Mw23eJkbRBXvbLUDUDQVQsg5AUvfY5nu8Ny5W"
},
{
name:"Bitcoin (BTC)",
address:"bc1qfwn7lfntn5jyl9yxgcrnhu4gaz8w5mnua0acyt"
},
{
name:"Injective (INJ)",
address:"inj1t696mehqhnn9sp7mvvnuk8v7ad7x56jm5gslj6"
},
{
name:"Dogecoin (DOGE)",
address:"DSTbQeqpCajXu8BYmririjJ8b8Lx92Lvov"
},
{
name:"Litecoin (LTC)",
address:"ltc1qz7ccrlkkv5qxrmlenr67jtqe3dy5k5w09sznvf"
},
{
name:"FIO",
address:"FIO67SRBSYY42urrjvN11AWuuTWHQzo47jH8LE1nrthe48EBxDo9e"
},
{
name:"ICP",
address:"8a92cb3db92beacc8982e1425c3c25b8f80381249d77ce19bf66c306d8727053"
},
{
name:"IOTX",
address:"io1p7ej7yufhsc7fwqv5vngde5llse00a4zsrs83w"
},
{
name:"Zilliqa (ZIL)",
address:"zil1de4766z0f9mm9psyflk3tcrxc562cw068y863d"
},
{
name:"MultiversX (eGLD)",
address:"erd1rgznaj8fvvy6jq80xyvnzjk0amv5t63l9vm276r0kf939gjy2p0sfakxj8"
},
{
name:"Osmosis (OSMO)",
address:"osmo148ds6u09ywv0d2zswjdcp0h9krs7f8eaf60gw5"
},
{
name:"Flux (FLUX)",
address:"t1LKNhr6hitag9QwTk7sGgBnwyyQYxFqMbv"
},
{
name:"JUNO",
address:"juno148ds6u09ywv0d2zswjdcp0h9krs7f8eahnlrl6"
},
{
name:"FIRO",
address:"aE7PmZpWuW7aXBqCXhpGmaF2XLSYert4DR"
},
{
name:"XRP",
address:"rUT9m6CoZqdNWKFm7q2zo8Htsy1cvfSuk"
},
{
name:"TRON (TRX)",
address:"TBh1vo5wazVxz5FCqmkVZSDAG2RgXJRPbo"
}
];

const container = document.getElementById("walletContainer");

wallets.forEach((wallet,index)=>{

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<div class="coin">${wallet.name}</div>

<div class="address">${wallet.address}</div>

<div class="qr" id="qr-${index}"></div>

<div class="buttons">
<button class="copy" onclick="copyAddress('${wallet.address}')">
📋 Copy
</button>

<button class="download" onclick="downloadQR(${index}, '${wallet.name}')">
⬇ Download QR
</button>
</div>
`;

container.appendChild(card);

new QRCode(document.getElementById(`qr-${index}`),{
text: wallet.address,
width:180,
height:180
});

});

function copyAddress(address){
navigator.clipboard.writeText(address);
alert("Address copied!");
}

function downloadQR(index,name){

const qrDiv = document.querySelector(`#qr-${index} img`) ||
document.querySelector(`#qr-${index} canvas`);

let url;

if(qrDiv.tagName === "IMG"){
url = qrDiv.src;
}else{
url = qrDiv.toDataURL("image/png");
}

const a = document.createElement("a");
a.href = url;
a.download = name + "-QR.png";
a.click();

}

</script>

</body>
</html>
