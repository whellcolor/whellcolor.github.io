<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wallet QR Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    padding:20px;
    margin:0;
}

h1{
    text-align:center;
}

.form-box{
    max-width:700px;
    margin:auto;
    background:#1e293b;
    padding:20px;
    border-radius:16px;
    margin-bottom:30px;
}

input,select{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    background:#0f172a;
    color:white;
    font-size:15px;
}

button{
    border:none;
    padding:12px 16px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    color:white;
}

.generate{
    background:#2563eb;
    width:100%;
}

.wallets{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:16px;
}

.coin{
    font-size:22px;
    font-weight:bold;
    margin-bottom:10px;
}

.address{
    background:#0f172a;
    padding:12px;
    border-radius:10px;
    word-break:break-all;
    margin-bottom:15px;
}

.qr{
    background:white;
    display:inline-block;
    padding:10px;
    border-radius:12px;
    margin-bottom:15px;
}

.actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.copy{
    background:#2563eb;
}

.download{
    background:#16a34a;
}

.explorer{
    background:#f59e0b;
    text-decoration:none;
    display:inline-block;
}

</style>
</head>
<body>

<h1>📬 Wallet QR Generator</h1>

<div class="form-box">

<select id="coin">
<option value="ETH">Ethereum</option>
<option value="SOL">Solana</option>
<option value="BTC">Bitcoin</option>
<option value="TRX">TRON</option>
<option value="DOGE">Dogecoin</option>
<option value="LTC">Litecoin</option>
<option value="XRP">XRP</option>
<option value="INJ">Injective</option>
<option value="OSMO">Osmosis</option>
<option value="JUNO">JUNO</option>
</select>

<input type="text"
id="address"
placeholder="Masukkan wallet address">

<button class="generate" onclick="generateWallet()">
⚡ Generate Wallet QR
</button>

</div>

<div class="wallets" id="wallets"></div>

<script>

const explorers = {

ETH:"https://etherscan.io/address/",
SOL:"https://solscan.io/account/",
BTC:"https://www.blockchain.com/explorer/addresses/btc/",
TRX:"https://tronscan.org/#/address/",
DOGE:"https://dogechain.info/address/",
LTC:"https://blockchair.com/litecoin/address/",
XRP:"https://livenet.xrpl.org/accounts/",
INJ:"https://www.mintscan.io/injective/address/",
OSMO:"https://www.mintscan.io/osmosis/address/",
JUNO:"https://www.mintscan.io/juno/address/"

};

let counter = 0;

function generateWallet(){

const coin =
document.getElementById("coin").value;

const address =
document.getElementById("address").value.trim();

if(address === ""){
alert("Masukkan wallet address!");
return;
}

counter++;

const walletBox =
document.getElementById("wallets");

const explorerLink =
(explorers[coin] || "") + address;

const card =
document.createElement("div");

card.className = "card";

card.innerHTML = `

<div class="coin">
${coin}
</div>

<div class="address">
${address}
</div>

<div class="qr" id="qr-${counter}"></div>

<div class="actions">

<button class="copy"
onclick="copyAddress('${address}')">
📋 Copy
</button>

<button class="download"
onclick="downloadQR(${counter}, '${coin}')">
⬇ Download
</button>

<a class="explorer"
href="${explorerLink}"
target="_blank">
🔎 Explorer
</a>

</div>

`;

walletBox.prepend(card);

new QRCode(document.getElementById(`qr-${counter}`),{
text: address,
width:180,
height:180
});

document.getElementById("address").value = "";

}

function copyAddress(address){

navigator.clipboard.writeText(address);

alert("Address copied!");

}

function downloadQR(id,name){

const qr =
document.querySelector(`#qr-${id} img`) ||
document.querySelector(`#qr-${id} canvas`);

let url;

if(qr.tagName === "IMG"){
url = qr.src;
}else{
url = qr.toDataURL("image/png");
}

const a =
document.createElement("a");

a.href = url;

a.download =
name + "-QR.png";

a.click();

}

</script>

</body>
</html>
