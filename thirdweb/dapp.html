// =========================
// CONNECT WALLET
// =========================

async function connectWallet(){

  try{

    if(!window.ethereum){

      alert("Please install MetaMask");

      return;
    }

    await ethereum.request({
      method:"eth_requestAccounts"
    });

    provider =
      new ethers.providers.Web3Provider(window.ethereum);

    signer = provider.getSigner();

    const address =
      await signer.getAddress();

    document.getElementById("walletAddress")
      .innerHTML =
      "Connected : " + address;

    contract =
      new ethers.Contract(
        CONTRACT_ADDRESS,
        ABI,
        signer
      );

  }catch(err){

    console.log(err);

    alert("Wallet connection failed");

  }

}

// =========================
// GET CONTRACT BALANCE
// =========================

async function getBalance(){

  try{

    const balance =
      await contract.contractBalance();

    document.getElementById("result")
      .innerHTML =
      ethers.utils.formatEther(balance)
      + " MATIC";

  }catch(err){

    console.log(err);

  }

}

// =========================
// SEND TRANSACTION
// =========================

async function sendTransaction(){

  try{

    const receiver =
      document.getElementById("receiver").value;

    const amount =
      document.getElementById("amount").value;

    const tx =
      await signer.sendTransaction({

        to: receiver,

        value:
          ethers.utils.parseEther(amount)

      });

    await tx.wait();

    alert("Transaction Success");

  }catch(err){

    console.log(err);

    alert("Transaction Failed");

  }

}

// =========================
// MINT NFT

}

// =========================
// CLAIM FAUCET
// =========================

async function claimFaucet(){

  try{

    const tx =
      await contract.claimFaucet();

    await tx.wait();

    alert("Claim Success");

  }catch(err){

    console.log(err);

    alert("Claim Failed");

  }

}

  const cooldown = localStorage.getItem(wallet);

  if (cooldown) {
    const last = parseInt(cooldown);
    const now = Date.now();
    const diff = now - last;
    const hours = diff / 1000 / 60 / 60;

    if (hours < 24) {
      statusText.innerText = "Cooldown Active";
      return;
    }
  }

  statusText.innerText = "Processing Claim...";
  progressBar.style.width = "10%";

  await delay(500);
  progressBar.style.width = "30%";

  await delay(500);
  progressBar.style.width = "60%";

  await delay(500);
  progressBar.style.width = "100%";

  await delay(1000);

  localStorage.setItem(wallet, Date.now());

  addHistory(wallet);

  statusText.innerText = "Claim Completed";

  setTimeout(() => {
    progressBar.style.width = "0%";
  }, 1000);
};

/* ======================
   HISTORY
====================== */
function addHistory(wallet) {
  const div = document.createElement("div");

  div.className = "bg-zinc-900 p-3 rounded-xl";
  div.innerHTML = `
    Faucet Sent to:
    <br/>
    <span class='text-cyan-400'>${wallet}</span>
    <br/>
    <span class='text-zinc-500 text-xs'>
      ${new Date().toLocaleString()}
    </span>
  `;

  historyDiv.prepend(div);
}
