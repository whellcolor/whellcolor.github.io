<script type="module">
  import { createAppKit } from "https://esm.sh/@reown/appkit";
  import { EthersAdapter } from "https://esm.sh/@reown/appkit-adapter-ethers";
  import { mainnet, arbitrum } from "https://esm.sh/@reown/appkit/networks";
  import { BrowserProvider, parseEther } from "https://esm.sh/ethers";

  const projectId = "5022875ce6ee68917f103ff9b1e3422d";

  const metadata = {
    name: "Faucet Generator",
    description: "Web3 Faucet",
    url: window.location.origin,
    icons: ["https://avatars.githubusercontent.com/u/179229932"],
  };

  const modal = createAppKit({
    adapters: [new EthersAdapter()],
    networks: [mainnet, arbitrum],
    metadata,
    projectId,
    features: {
      analytics: true,
    },
  });

  let provider;

  modal.subscribeProviders((state) => {
    provider = state?.eip155;
    window.provider = provider;
  });

  const status = document.getElementById("status");

  function setStatus(msg) {
    status.innerHTML = msg;
  }

  // SEND ETH
  window.sendTx = async function () {
    try {

      if (!provider) {
        setStatus("❌ Wallet belum connect");
        return;
      }

      const ethersProvider = new BrowserProvider(provider);
      const signer = await ethersProvider.getSigner();

      setStatus("⏳ Sending transaction...");

      const tx = await signer.sendTransaction({
        to: "0xd8519A8b8825Aa0DcC73aAD572f447FAE102fe88",
        value: parseEther("0.0001"),
      });

      setStatus(`
        ✅ Transaction Sent <br>
        Hash: ${tx.hash}
      `);

    } catch (err) {
      console.error(err);
      setStatus("❌ Transaction Failed");
    }
  };

  // MINT TOKEN
  window.mintToken = async function () {

    try {

      const wallet = document.getElementById("wallet").value;

      if (!wallet) {
        setStatus("❌ Masukkan wallet address");
        return;
      }

      setStatus("⏳ Minting token...");

      const response = await fetch(
        "https://api.thirdweb.com/v1/transactions",
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json",

            // JANGAN taruh secret key di frontend production
            "x-secret-key":
              "-mo2kL01Syg12xzGeqFXFP_GDqg9Pt08hYCsIp0TOWmuOtedh-1rJUTJJW-2K24ZWyIkXWupLQW2Yvb-iTu0TA",
          },

          body: JSON.stringify({
            chainId: "84532",

            from:
              "0x5E8Bade6E0BCe65807dB6327cB1D9EEb7C6A6A5B",

            transactions: [
              {
                type: "contractCall",

                contractAddress:
                  "0x85e23b94e7F5E9cC1fF78BCe78cfb15B81f0DF00",

                method:
                  "function mintTo(address to, uint256 amount)",

                params: [wallet, "100"],
              },
            ],
          }),
        }
      );

      const data = await response.json();

      console.log(data);

      setStatus(`
        ✅ Faucet Success
        <br>
        Token berhasil dikirim
      `);

    } catch (err) {

      console.error(err);

      setStatus("❌ Faucet Failed");
    }
  };

  // CHECK BALANCE
  window.checkBalance = async function () {

    try {

      setStatus("⏳ Checking balance...");

      const response = await fetch(
        "https://api.etherscan.io/v2/api?apikey=8WRIDBMW18HXAB44ATGX7IPYGSHXVXDVC3&address=0xd8519a8b8825aa0dcc73aad572f447fae102fe88&module=DappMiner&action=balancemulti&tag=0x10d4f&chainid=8453"
      );

      console.log(data);

        <br>
        ${JSON.stringify(data)}
      `);

    } catch (err) {

      console.error(err);

      setStatus("❌ Failed load balance");
    }
  };
