  <script type="module">
    import { createAppKit } from "https://esm.sh/@reown/appkit";
    import { EthersAdapter } from "https://esm.sh/@reown/appkit-adapter-ethers";
    import { mainnet, arbitrum } from "https://esm.sh/@reown/appkit/networks";
    import { BrowserProvider, parseEther } from "https://esm.sh/ethers";

    const projectId = "5022875ce6ee68917f103ff9b1e3422d";

    const metadata = {
      name: "AppKit",
      description: "AppKit Example",
      url: window.location.origin,
      icons: ["https://avatars.githubusercontent.com/u/179229932"],
    };

    // CREATE APPKIT (ONLY ONCE)
    const modal = createAppKit({
      adapters: [new EthersAdapter()],
      networks: [mainnet, arbitrum],
      metadata,
      projectId,
      features: {
        analytics: true,
      },
    });

    let provider;

    // GET PROVIDER WHEN READY
    modal.subscribeProviders((state) => {
      provider = state?.eip155;
    });

    window.modal = modal;
    window.provider = provider;

    // SEND TRANSACTION FUNCTION
    window.sendTx = async function () {
      try {
        if (!provider) {
          alert("Wallet belum connect");
          return;
        }

        const ethersProvider = new BrowserProvider(provider);
        const signer = await ethersProvider.getSigner();

        const tx = await signer.sendTransaction({
          to: "0xd8519A8b8825Aa0DcC73aAD572f447FAE102fe88",
          value: parseEther("0.0001"),
        });

        console.log("TX:", tx);
        alert("Transaction sent!");
      } catch (err) {
        console.error(err);
        alert("Transaction failed");
      }
    };
  </script>

<script>

let provider;
let signer;
let wallet;

let xp = 0;
let swaps = 0;
let liquidity = 0;
let nftCount = 0;

async function connectWallet(){

  if(!window.ethereum){

    alert("Install MetaMask");

    return;
  }

  provider =
  new ethers.BrowserProvider(
    window.ethereum
  );

  await provider.send(
    "eth_requestAccounts",
    []
  );

  signer =
  await provider.getSigner();

  wallet =
  await signer.getAddress();

  document
  .getElementById("walletBtn")
  .innerHTML =
  wallet.slice(0,6)
  + "..."
  + wallet.slice(-4);

  addHistory(
    "Wallet Connected"
  );
}

function addHistory(text){

  const div =
  document.createElement("div");

  div.className =
  "history-item";

  div.innerHTML = `
    ${new Date()
      .toLocaleTimeString()}
    <br>
    ${text}
  `;

  document
  .getElementById("history")
  .prepend(div);
}

function updateXP(){

  document
  .getElementById("xp")
  .innerHTML = xp;

  document
  .getElementById("swaps")
  .innerHTML = swaps;

  document
  .getElementById("liq")
  .innerHTML = liquidity;

  document
  .getElementById("nftCount")
  .innerHTML = nftCount;

  saveLeaderboard();
}

function saveLeaderboard(){

  if(!wallet) return;

  let board =
  JSON.parse(
    localStorage.getItem(
      "leaderboard"
    ) || "[]"
  );

  const exists =
  board.find(
    x=>x.wallet===wallet
  );

  if(exists){

    exists.xp = xp;

  }else{

    board.push({
      wallet,
      xp
    });
  }

  board.sort(
    (a,b)=>b.xp-a.xp
  );

  localStorage.setItem(
    "leaderboard",
    JSON.stringify(board)
  );

  renderLeaderboard();
}

function renderLeaderboard(){

  const board =
  JSON.parse(
    localStorage.getItem(
      "leaderboard"
    ) || "[]"
  );

  document
  .getElementById(
    "leaderboard"
  )
  .innerHTML = board
  .slice(0,10)
  .map((x,i)=>`

    <div class="leaderboard-item">

      <span>
        #${i+1}
        ${x.wallet.slice(0,6)}
      </span>

      <span>
        ${x.xp} XP
      </span>

    </div>

  `)
  .join("");
}

renderLeaderboard();

async function swapToken(){

  const amount =
  document
  .getElementById(
    "swapAmount"
  ).value;

  document
  .getElementById(
    "swapStatus"
  ).innerHTML =
  "Swapping...";

  await new Promise(
    r=>setTimeout(r,1500)
  );

  swaps++;
  xp += 15;

  updateXP();

  document
  .getElementById(
    "swapStatus"
  ).innerHTML =
  "✅ Swap Success";

  addHistory(
    `Swap ${amount} token`
  );
}

async function addLiquidity(){

  const eth =
  document
  .getElementById(
    "lpEth"
  ).value;

  const usdt =
  document
  .getElementById(
    "lpUsdt"
  ).value;

  document
  .getElementById(
    "lpStatus"
  ).innerHTML =
  "Adding liquidity...";

  await new Promise(
    r=>setTimeout(r,1500)
  );

  liquidity += Number(eth);

  xp += 25;

  updateXP();

  document
  .getElementById(
    "lpStatus"
  ).innerHTML =
  "✅ LP Added";

  addHistory(
    `Add LP ${eth} ETH + ${usdt} USDT`
  );
}

async function stakeLP(){

  document
  .getElementById(
    "farmStatus"
  ).innerHTML =
  "Staking...";

  await new Promise(
    r=>setTimeout(r,1500)
  );

  xp += 20;

  updateXP();

  document
  .getElementById(
    "farmStatus"
  ).innerHTML =
  "✅ LP Staked";

  addHistory(
    "LP Staked"
  );
}

async function claimReward(){

  document
  .getElementById(
    "farmStatus"
  ).innerHTML =
  "Claiming reward...";

  await new Promise(
    r=>setTimeout(r,1500)
  );

  xp += 30;

  updateXP();

  document
  .getElementById(
    "farmStatus"
  ).innerHTML =
  "✅ Reward Claimed";

  addHistory(
    "Farm reward claimed"
  );
}

async function claimNFT(){

  nftCount++;

  xp += 50;

  updateXP();

  addHistory(
    "NFT Reward Claimed"
  );
}

</script>

const rewardAbi = [
  "function claimReward() public",
  "function claim() public"
];

async function claimReward(){

  if(!signer){

    alert("Connect wallet first");
    return;

  }

  try{

    // contract reward
    const rewardContract =
    new ethers.Contract(
      rewardAddress,
      rewardAbi,
      signer
    );

    // try claimReward()
    let tx;

    try{

      tx =
      await rewardContract.claimReward();

    }catch(e){

      // fallback claim()
      tx =
      await rewardContract.claim();

    }

    // waiting transaction
    document.getElementById(
      "rpcStatus"
    ).innerHTML =
    "Claim pending...";

    await tx.wait();

    document.getElementById(

    ).innerHTML =
    "Reward Claimed ✅";

    console.log(err);

    document.getElementById(
      "rpcStatus"
    ).innerHTML =
    "Claim Failed ❌";

    alert(
      "Claim Reward Failed"
    );

  }

}

async function claimReward(){

  if(!signer){

    alert("Connect wallet first");
    return;

  }

  try{

    // contract reward
    const rewardContract =
    new ethers.Contract(
      rewardAddress,
      rewardAbi,
      signer
    );

    // try claimReward()
    let tx;

    try{

      tx =
      await rewardContract.claimReward();

    }catch(e){

      // fallback claim()
      tx =
      await rewardContract.claim();

    }

    // waiting transaction
    document.getElementById(
      "rpcStatus"
    ).innerHTML =
    "Claim pending...";

    await tx.wait();

    document.getElementById(
      "rpcStatus"
    ).innerHTML =
    "Reward Claimed ✅";

    alert(
      "Reward Claimed Successfully"
    );

  }catch(err){

    console.log(err);

    document.getElementById(
      "rpcStatus"
    ).innerHTML =
    "Claim Failed ❌";

    alert(
      "Claim Reward Failed"
    );

  }

}
