<script>

// =======================
// METODE 1
// =======================

function generateManualLink(){

    const url = document.getElementById("url1").value.trim();
    const result = document.getElementById("result1");

    if(url === ""){
        alert("Masukkan URL terlebih dahulu!");
        return;
    }

    const apiToken = "845ad6039e4754d9ab8f5d84933424c6e36795bc";

    const safeLink =
        "https://sfl.gl/st/?api=" +
        apiToken +
        "&url=" +
        encodeURIComponent(url);

    result.innerHTML = `
        <div class="result">

            <b>Safelink:</b><br><br>

            <input type="text"
                   id="copyText1"
                   value="${safeLink}"
                   readonly>

            <button class="copy-btn"
                    onclick="copyLink('copyText1')">

                Copy Link

            </button>

        </div>
    `;
}

// =======================
// METODE 2
// =======================

async function generateApiLink() {

    const url = document.getElementById("url2").value.trim();
    const alias = document.getElementById("alias").value.trim();
    const passcode = document.getElementById("passcode").value.trim();

    const output = document.getElementById("result2");

    if(url === ""){
        alert("Masukkan URL terlebih dahulu!");
        return;
    }

    output.innerHTML = "Loading...";

    const data = {
        url: url
    };

    if(alias){
        data.alias = alias;
    }

    if(passcode){
        data.passcode = passcode;
    }

    try {

        const response = await fetch(
            "https://safelinku.com/api/v1/links",
            {
                method: "POST",
                headers: {
                    "Authorization":
                        "Bearer 845ad6039e4754d9ab8f5d84933424c6e36795bc",

                    "Content-Type":
                        "application/json"
                },
                body: JSON.stringify(data)
            }
        );

        const result = await response.json();

        console.log(result);

        const shortUrl =
            result.shortenedUrl ||
            result.short_url ||
            result.url;

        if(shortUrl){

            output.innerHTML = `
                <div class="result">

                    <b>Safelink:</b><br><br>

                    <input type="text"
                           id="copyText2"
                           value="${shortUrl}"
                           readonly>

                    <button class="copy-btn"
                            onclick="copyLink('copyText2')">

                        Copy Link

                    </button>

                </div>
            `;

        } else {

            output.innerHTML = `
                <div class="error">

                    Gagal membuat safelink

                    <br><br>

                    ${JSON.stringify(result)}

                </div>
            `;
        }

    } catch(err){

        output.innerHTML = `
            <div class="error">

                Error: ${err.message}

            </div>
        `;
    }
}

// =======================
// COPY LINK
// =======================

function copyLink(id){

    const copyText = document.getElementById(id);

    copyText.select();
    copyText.setSelectionRange(0,99999);

    navigator.clipboard.writeText(copyText.value);

    alert("Link berhasil dicopy!");
}

</script>
