<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TRX Faucet Miner</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
margin-right:10px;
}

.stop{
background:#ef4444;
}

.stat{
font-size:30px;
font-weight:bold;
margin-top:10px;
}

</style>

</head>

<body>

<div class="card">

<h2>TRX STRA Faucet Miner</h2>

<label>Input Wallet TRX</label>

<input
id="wallet"
placeholder="TXXXXXXXXXXXX"
/>

<button onclick="startFaucet()">
START CLAIM
</button>

<button class="stop"
onclick="stopFaucet()">
STOP CLAIM
</button>

</div>

<div class="card">

<h3>Status</h3>

<p id="status">
Waiting...
</p>

</div>

<div class="card">

<h3>Realtime GH/s</h3>

<div class="stat" id="ghs">
0 GH/s
</div>

</div>

<div class="card">

<h3>Total Faucet</h3>

<div class="stat" id="total">
0 TRX
</div>

</div>

<div class="card">

<canvas id="chart"></canvas>

</div>

<script>

let interval;

let total = 0;

const ctx =
document.getElementById('chart');

const chart =
new Chart(ctx,{

type:'line',

data:{
labels:[],
datasets:[{
label:'Realtime GH/s',
data:[],
borderColor:'#22c55e',
backgroundColor:'rgba(34,197,94,0.2)',
tension:0.4
}]
},

options:{
responsive:true
}

});

function realtimeGraph(){

const ghs =
(Math.random()*1000).toFixed(2);

document.getElementById('ghs')
.innerHTML =
ghs + ' GH/s';

chart.data.labels.push(
new Date().toLocaleTimeString()
);

chart.data.datasets[0]
.data.push(ghs);

if(chart.data.labels.length > 20){

chart.data.labels.shift();

chart.data.datasets[0]
.data.shift();

}

chart.update();

}

function faucetClaim(){

const wallet =
document.getElementById('wallet').value;

if(wallet.length < 20){

alert('Input wallet TRX');

stopFaucet();

return;

}

realtimeGraph();

total += 100;

document.getElementById('total')
.innerHTML =
total + ' TRX';

document.getElementById('status')
.innerHTML =
'Claim success to ' + wallet;

console.log(
'Claim faucet 100 TRX =>',
wallet
);

}

function startFaucet(){

if(interval) return;

faucetClaim();

interval =
setInterval(faucetClaim,5000);

document.getElementById('status')
.innerHTML =
'Faucet running...';

}

function stopFaucet(){

clearInterval(interval);

interval = null;

document.getElementById('status')
.innerHTML =
'Faucet stopped';

}

</script>

</body>
</html>
