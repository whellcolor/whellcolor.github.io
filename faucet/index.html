<script>

// ======================================
// TESTNET ONLY
// ======================================

const NETWORKS = [

{
name:"Ethereum Sepolia",
chain:"evm",
rpc:"https://sepolia.infura.io/v3/418d1e12e6e4490fa5ed80a4b3b8ae8a"
},

{
name:"Base Sepolia",
chain:"evm",
rpc:"https://base-sepolia.infura.io/v3/418d1e12e6e4490fa5ed80a4b3b8ae8a"
},

{
name:"Arbitrum Sepolia",
chain:"evm",
rpc:"https://arbitrum-sepolia.infura.io/v3/418d1e12e6e4490fa5ed80a4b3b8ae8a"
},

{
name:"Polygon Amoy",
chain:"evm",
rpc:"https://polygon-amoy.infura.io/v3/418d1e12e6e4490fa5ed80a4b3b8ae8a"
},

{
name:"Avalanche Fuji",
chain:"evm",
rpc:"https://avalanche-fuji.infura.io/v3/418d1e12e6e4490fa5ed80a4b3b8ae8a"
},

{
name:"Solana Devnet",
chain:"solana",
rpc:"https://api.devnet.solana.com"
}

];

// ======================================
// GLOBAL
// ======================================

let currentProvider;
let cooldown = 60;

// ======================================
// LOAD NETWORK
// ======================================

function loadNetworks(){

    const select =
        document.getElementById("network");

    NETWORKS.forEach((net,index)=>{

        const option =
            document.createElement("option");

        option.value = index;

        option.innerHTML =
            net.name;

        select.appendChild(option);

    });

}

loadNetworks();

// ======================================
// CONNECT EVM
// ======================================

async function connectEVM(){

    if(!window.ethereum){

        alert("Install MetaMask");
        return;

    }

    const accounts =
        await window.ethereum.request({
            method:"eth_requestAccounts"
        });

    document.getElementById("wallet").value =
        accounts[0];

}

// ======================================
// CONNECT SOLANA
// ======================================

async function connectSolana(){

    if(!window.solana){

        alert("Install Phantom");
        return;

    }

    const res =
        await window.solana.connect();

    document.getElementById("wallet").value =
        res.publicKey.toString();

}

// ======================================
// COOLDOWN
// ======================================

function startCooldown(){

    let time = cooldown;

    const timer =
        setInterval(()=>{

            document.getElementById(
                "cooldown"
            ).innerHTML =

            `Cooldown : ${time}s`;

            time--;

            if(time < 0){

                clearInterval(timer);

                document.getElementById(
                    "cooldown"
                ).innerHTML =

                "Ready";

            }

        },1000);

}

// ======================================
// ANTI SPAM
// ======================================

function canClaim(wallet){

    const last =
        localStorage.getItem(
            "claim_"+wallet
        );

    if(!last) return true;

    const diff =
        Date.now() - Number(last);

    return diff > cooldown * 1000;

}

// ======================================
// SAVE CLAIM
// ======================================

function saveClaim(wallet){

    localStorage.setItem(
        "claim_"+wallet,
        Date.now()
    );

}

// ======================================
// HISTORY
// ======================================

function saveHistory(data){

    let history =
        JSON.parse(
            localStorage.getItem("txHistory")
        ) || [];

    history.unshift(data);

    localStorage.setItem(
        "txHistory",
        JSON.stringify(history)
    );

    renderHistory();

}

function renderHistory(){

    let history =
        JSON.parse(
            localStorage.getItem("txHistory")
        ) || [];

    const el =
        document.getElementById("history");

    el.innerHTML = "";

    history.forEach(tx=>{

        el.innerHTML += `

        <div class="bg-slate-900 p-4 rounded-xl mb-3">

            <div>${tx.network}</div>

            <div class="text-sm text-slate-400">
                ${tx.hash}
            </div>

        </div>

        `;

    });

}

renderHistory();

// ======================================
// FASTEST RPC
// ======================================

async function getFastestRPC(chain){

    const list =
        NETWORKS.filter(
            x=>x.chain===chain
        );

    let best = list[0];

    let bestTime = 999999;

    for(let rpc of list){

        const start = Date.now();

        try{

            if(chain==="evm"){

                const provider =
                    new ethers.JsonRpcProvider(
                        rpc.rpc
                    );

                await provider.getBlockNumber();

            }else{

                const conn =
                    new solanaWeb3.Connection(
                        rpc.rpc
                    );

                await conn.getBlockHeight();

            }

            const speed =
                Date.now() - start;

            if(speed < bestTime){

                best = rpc;
                bestTime = speed;

            }

        }catch(err){}

    }

    return best;

}

// ======================================
// CLAIM FAUCET
// ======================================

async function claimFaucet(){

    const wallet =
        document.getElementById("wallet")
        .value.trim();

    if(!wallet){

        alert("Input wallet");
        return;

    }

    if(!canClaim(wallet)){

        alert("Cooldown active");
        return;

    }

    const network =
        NETWORKS[
            document.getElementById(
                "network"
            ).value
        ];

    document.getElementById(
        "status"
    ).innerHTML =

    "Processing...";

    try{

        // ======================
        // SOLANA
        // ======================

        if(network.chain==="solana"){

            const conn =
                new solanaWeb3.Connection(
                    network.rpc,
                    "confirmed"
                );

            const sig =
                await conn.requestAirdrop(
                    new solanaWeb3.PublicKey(
                        wallet
                    ),
                    solanaWeb3.LAMPORTS_PER_SOL
                );

            saveHistory({
                network:network.name,
                hash:sig
            });

            document.getElementById(
                "status"
            ).innerHTML =

            `
            ✅ Success<br><br>
            ${sig}
            `;

        }

        // ======================
        // EVM TESTNET
        // ======================

        else{

            const rpc =
                await getFastestRPC("evm");

            const provider =
                new ethers.JsonRpcProvider(
                    rpc.rpc
                );

            const block =
                await provider.getBlockNumber();

            const fakeHash =
                "BLOCK-"+block;

            saveHistory({
                network:network.name,
                hash:fakeHash
            });

            document.getElementById(
                "status"
            ).innerHTML =

            `
            ✅ RPC Connected<br><br>
            ${rpc.name}<br>
            Block : ${block}
            `;

        }

        saveClaim(wallet);

        startCooldown();

    }catch(err){

        document.getElementById(
            "status"
        ).innerHTML =

        `
        ❌ Error<br><br>
        ${err.message}
        `;

    }

}

</script>
