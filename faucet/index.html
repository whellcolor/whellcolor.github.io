<script>

// =========================
// NETWORKS
// =========================

const NETWORKS = [

{
name:"Ethereum Sepolia",
chain:"evm",
rpc:"https://sepolia.infura.io/v3/418d1e12e6e4490fa5ed80a4b3b8ae8a"
},

{
name:"Base Sepolia",
chain:"evm",
rpc:"https://base-sepolia.infura.io/v3/418d1e12e6e4490fa5ed80a4b3b8ae8a"
},

{
name:"Arbitrum Sepolia",
chain:"evm",
rpc:"https://arbitrum-sepolia.infura.io/v3/418d1e12e6e4490fa5ed80a4b3b8ae8a"
},

{
name:"Polygon Amoy",
chain:"evm",
rpc:"https://polygon-amoy.infura.io/v3/418d1e12e6e4490fa5ed80a4b3b8ae8a"
},

{
name:"Avalanche Fuji",
chain:"evm",
rpc:"https://avalanche-fuji.infura.io/v3/418d1e12e6e4490fa5ed80a4b3b8ae8a"
},

{
name:"Solana Devnet",
chain:"solana",
rpc:"https://solana-devnet.infura.io/v3/418d1e12e6e4490fa5ed80a4b3b8ae8a"
}

];

// =========================
// GLOBAL
// =========================

let cooldownTime = 60;

// =========================
// INIT NETWORK
// =========================

function loadNetworks(){

    const el = document.getElementById("network");

    NETWORKS.forEach((n,i)=>{

        const opt = document.createElement("option");
        opt.value = i;
        opt.innerText = n.name;

        el.appendChild(opt);

    });

}

loadNetworks();

// =========================
// CONNECT EVM
// =========================

async function connectEVM(){

    if(!window.ethereum) return alert("Install MetaMask");

    const acc = await window.ethereum.request({
        method:"eth_requestAccounts"
    });

    document.getElementById("wallet").value = acc[0];

}

// =========================
// CONNECT SOLANA
// =========================

async function connectSolana(){

    if(!window.solana) return alert("Install Phantom");

    const res = await window.solana.connect();

    document.getElementById("wallet").value =
        res.publicKey.toString();

}

// =========================
// FAST RPC
// =========================

async function getFastestRPC(chain){

    const list = NETWORKS.filter(x=>x.chain===chain);

    let best = list[0];
    let bestTime = 999999;

    for(const r of list){

        const start = Date.now();

        try{

            if(chain==="evm"){
                const p = new ethers.JsonRpcProvider(r.rpc);
                await p.getBlockNumber();
            }else{
                const c = new solanaWeb3.Connection(r.rpc);
                await c.getBlockHeight();
            }

            const t = Date.now() - start;

            if(t < bestTime){
                best = r;
                bestTime = t;
            }

        }catch(e){}

    }

    return best;

}

// =========================
// ANTI SPAM
// =========================

function canClaim(wallet){

    const key = "claim_"+wallet;
    const last = localStorage.getItem(key);

    if(!last) return true;

    return Date.now() - last > cooldownTime*1000;

}

// =========================
// SAVE CLAIM
// =========================

function saveClaim(wallet){
    localStorage.setItem("claim_"+wallet,Date.now());
}

// =========================
// HISTORY
// =========================

function saveHistory(data){

    let h = JSON.parse(localStorage.getItem("tx")) || [];

    h.unshift(data);

    localStorage.setItem("tx",JSON.stringify(h));

    renderHistory();

}

function renderHistory(){

    let h = JSON.parse(localStorage.getItem("tx")) || [];

    document.getElementById("history").innerHTML =
        h.map(x=>`
            <div class="bg-slate-900 p-3 rounded-xl mb-2">
                <div>${x.network}</div>
                <div class="text-xs text-gray-400">${x.hash}</div>
            </div>
        `).join("");

}

renderHistory();

// =========================
// COOLDOWN UI
// =========================

function startCooldown(){

    let t = cooldownTime;

    const i = setInterval(()=>{

        document.getElementById("cooldown").innerText =
            "Cooldown: "+t+"s";

        t--;

        if(t<0){
            clearInterval(i);
            document.getElementById("cooldown").innerText="Ready";
        }

    },1000);

}

// =========================
// CLAIM FAUCET
// =========================

async function claimFaucet(){

    const wallet = document.getElementById("wallet").value.trim();

    if(!wallet) return alert("Input wallet");

    if(!canClaim(wallet)) return alert("Cooldown active");

    const net = NETWORKS[
        document.getElementById("network").value
    ];

    document.getElementById("status").innerText = "Processing...";

    try{

        if(net.chain==="solana"){

            const c = new solanaWeb3.Connection(net.rpc,"confirmed");

            const sig = await c.requestAirdrop(
                new solanaWeb3.PublicKey(wallet),
                solanaWeb3.LAMPORTS_PER_SOL
            );

            saveHistory({
                network:net.name,
                hash:sig
            });

            document.getElementById("status").innerText =
                "SOL Airdrop Success";

        }else{

            const rpc = await getFastestRPC("evm");

            const p = new ethers.JsonRpcProvider(rpc.rpc);

            const b = await p.getBlockNumber();

            saveHistory({
                network:net.name,
                hash:"RPC-"+b
            });

            document.getElementById("status").innerText =
                "EVM RPC OK (no direct faucet in frontend)";

        }

        saveClaim(wallet);
        startCooldown();

    }catch(e){

        document.getElementById("status").innerText = e.message;

    }

}

</script>
